name: Feature request
description: Propose a new transport contract, benchmark lane, runtime optimization, or integration.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or missing capability are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the idea with concrete changes if possible.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link papers, provider docs, or benchmark artifacts if they support the idea.
