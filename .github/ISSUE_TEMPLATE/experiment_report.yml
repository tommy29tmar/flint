name: Experiment report
description: Share a provider/model benchmark, transport profile, or benchmark result.
title: "[experiment] "
labels: ["experiment"]
body:
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
      description: What were you trying to test?
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Provider and model
      placeholder: anthropic / claude-sonnet-4-6
    validations:
      required: true
  - type: input
    id: corpus
    attributes:
      label: Corpus or task set
      placeholder: evals/tasks_hybrid_micro_extended.jsonl
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Result
      description: Include parse rate, must-include, total tokens, latency, and links to artifacts if available.
    validations:
      required: true
  - type: textarea
    id: interpretation
    attributes:
      label: Interpretation
      description: What should change in SIGIL because of this result?
