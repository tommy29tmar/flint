name: Bug report
description: Report a defect in the parser, runtime, benchmark harness, or docs.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Short description of the problem.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include commands, task ids, model names, or files needed to reproduce.
      placeholder: |
        1. Run ...
        2. Use model ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Python version, provider, model, and OS if relevant.
      placeholder: Python 3.12, gpt-5.4-mini, Ubuntu 24.04
    validations:
      required: true
